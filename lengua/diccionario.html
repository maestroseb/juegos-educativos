<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Misión: Detectives del Diccionario</title>
    
    <!-- Tailwind CSS para el diseño -->
  <script src="https://maestroseb.github.io/recursos/tailwind.js"></script>
    
    <!-- React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel para traducir el código React en el navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .animate-bounce-slow {
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(-5%); }
            50% { transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- ICONOS SVG (Integrados para no depender de librerías externas) ---
        const IconBook = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
            </svg>
        );
        const IconSearch = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
        );
        const IconStar = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
        );
        const IconArrowRight = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        );
        const IconCheckCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
        );
        const IconXCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="15" y1="9" x2="9" y2="15"></line>
                <line x1="9" y1="9" x2="15" y2="15"></line>
            </svg>
        );
        const IconHelpCircle = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                <line x1="12" y1="17" x2="12.01" y2="17"></line>
            </svg>
        );
        const IconTrophy = ({ size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M8 21h8m-4-9v9m-4.8-9a4 4 0 0 1 0-8h9.6a4 4 0 0 1 0 8s-1.2 4-4.8 4-4.8-4-4.8-4"></path>
                <path d="M3 7h2M19 7h2"></path>
            </svg>
        );

        // --- COMPONENTE PRINCIPAL ---
        const DictionaryGame = () => {
            const [gameState, setGameState] = useState('intro'); // intro, explanation, game, result
            const [currentQuestion, setCurrentQuestion] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [isCorrect, setIsCorrect] = useState(false);

            // Datos del juego
            const questions = [
                {
                    word: "BANCO",
                    sentence: "Mi abuelo se sentó en el banco del parque a leer.",
                    options: [
                        { id: 1, text: "Empresa que guarda dinero.", correct: false },
                        { id: 2, text: "Asiento largo para varias personas.", correct: true },
                        { id: 3, text: "Grupo grande de peces.", correct: false }
                    ]
                },
                {
                    word: "SIRENA",
                    sentence: "La sirena de la ambulancia sonaba muy fuerte.",
                    options: [
                        { id: 1, text: "Ser fantástico, mitad mujer y mitad pez.", correct: false },
                        { id: 2, text: "Aparato que produce un sonido de aviso muy fuerte.", correct: true }
                    ]
                },
                {
                    word: "RATÓN",
                    sentence: "Se me rompió el ratón del ordenador y no puedo hacer clic.",
                    options: [
                        { id: 1, text: "Animal roedor pequeño.", correct: false },
                        { id: 2, text: "Aparato para manejar el cursor del ordenador.", correct: true }
                    ]
                },
                {
                    word: "COPA",
                    sentence: "El pájaro hizo su nido en la copa del árbol.",
                    options: [
                        { id: 1, text: "Vaso con pie para beber.", correct: false },
                        { id: 2, text: "Premio que se gana en un campeonato.", correct: false },
                        { id: 3, text: "Parte más alta de un árbol.", correct: true }
                    ]
                },
                {
                    word: "CANGURO",
                    sentence: "Hoy mis padres salen, así que vendrá la canguro a cuidarnos.",
                    options: [
                        { id: 1, text: "Animal de Australia que salta mucho.", correct: false },
                        { id: 2, text: "Prenda de ropa deportiva con capucha.", correct: false },
                        { id: 3, text: "Persona joven que cuida niños.", correct: true }
                    ]
                }
            ];

            const handleOptionClick = (option) => {
                if (showFeedback) return;

                setSelectedOption(option.id);
                setShowFeedback(true);
                
                if (option.correct) {
                    setIsCorrect(true);
                    setScore(score + 1);
                } else {
                    setIsCorrect(false);
                }
            };

            const nextQuestion = () => {
                setSelectedOption(null);
                setShowFeedback(false);
                setIsCorrect(false);
                
                if (currentQuestion < questions.length - 1) {
                    setCurrentQuestion(currentQuestion + 1);
                } else {
                    setGameState('result');
                }
            };

            const restartGame = () => {
                setGameState('intro');
                setCurrentQuestion(0);
                setScore(0);
                setSelectedOption(null);
                setShowFeedback(false);
            };

            // Pantalla 1: Intro
            if (gameState === 'intro') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-blue-50 p-4 font-sans text-center">
                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-xl max-w-lg w-full border-b-8 border-blue-400">
                            <div className="flex justify-center mb-6">
                                <IconSearch size={64} className="text-blue-500 mr-2" />
                                <IconBook size={64} className="text-orange-500" />
                            </div>
                            <h1 className="text-2xl md:text-3xl font-bold text-gray-800 mb-4">Misión: Detectives del Diccionario</h1>
                            <p className="text-lg text-gray-600 mb-8">
                                ¡Hola clase de 3º! Hoy vamos a aprender a buscar significados ocultos. ¿Estáis listos para investigar?
                            </p>
                            <button 
                                onClick={() => setGameState('explanation')}
                                className="w-full md:w-auto bg-green-500 hover:bg-green-600 text-white text-xl font-bold py-4 px-8 rounded-full shadow-lg transform transition hover:scale-105 flex items-center justify-center mx-auto"
                            >
                                Empezar la Misión <IconArrowRight className="ml-2" />
                            </button>
                        </div>
                    </div>
                );
            }

            // Pantalla 2: Explicación
            if (gameState === 'explanation') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-yellow-50 p-4 font-sans">
                        <div className="bg-white p-6 md:p-8 rounded-3xl shadow-xl max-w-2xl w-full border-b-8 border-yellow-400">
                            <h2 className="text-2xl font-bold text-gray-800 mb-6 flex items-center justify-center">
                                <IconHelpCircle className="mr-2 text-yellow-500" /> ¿Qué es una Acepción?
                            </h2>
                            
                            <div className="bg-blue-100 p-6 rounded-xl mb-6 text-left">
                                <p className="text-lg mb-4 text-gray-700">
                                    Imagina que las palabras son <strong>actores con disfraces</strong>.
                                </p>
                                <p className="text-lg mb-4 text-gray-700">
                                    La palabra <strong>"PLANTA"</strong> puede disfrazarse de:
                                </p>
                                <ul className="list-none space-y-3">
                                    <li className="flex items-center bg-white p-3 rounded-lg shadow-sm">
                                        <span className="bg-blue-500 text-white font-bold rounded-full w-8 h-8 flex items-center justify-center mr-3 flex-shrink-0">1</span>
                                        <span>Un ser vivo vegetal (un árbol, una flor...). 🌳</span>
                                    </li>
                                    <li className="flex items-center bg-white p-3 rounded-lg shadow-sm">
                                        <span className="bg-blue-500 text-white font-bold rounded-full w-8 h-8 flex items-center justify-center mr-3 flex-shrink-0">2</span>
                                        <span>La parte inferior del pie. 👣</span>
                                    </li>
                                    <li className="flex items-center bg-white p-3 rounded-lg shadow-sm">
                                        <span className="bg-blue-500 text-white font-bold rounded-full w-8 h-8 flex items-center justify-center mr-3 flex-shrink-0">3</span>
                                        <span>Cada uno de los pisos de un edificio. 🏢</span>
                                    </li>
                                </ul>
                            </div>

                            <p className="text-gray-600 mb-8 text-lg text-center">
                                A cada uno de esos significados numerados lo llamamos <strong>ACEPCIÓN</strong>.
                            </p>

                            <div className="text-center">
                                <button 
                                    onClick={() => setGameState('game')}
                                    className="bg-orange-500 hover:bg-orange-600 text-white text-xl font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105"
                                >
                                    ¡Entendido! Vamos a Jugar
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            // Pantalla 3: Juego
            if (gameState === 'game') {
                const currentQ = questions[currentQuestion];

                return (
                    <div className="flex flex-col items-center min-h-screen bg-indigo-50 p-4 font-sans">
                        {/* Barra de Progreso */}
                        <div className="w-full max-w-2xl flex justify-between items-center mb-6">
                            <div className="text-gray-500 font-bold text-sm md:text-base">Caso {currentQuestion + 1} de {questions.length}</div>
                            <div className="flex items-center bg-white px-4 py-2 rounded-full shadow">
                                <IconStar className="text-yellow-400 fill-current mr-2" />
                                <span className="font-bold text-gray-700">{score} Puntos</span>
                            </div>
                        </div>

                        {/* Tarjeta de Pregunta */}
                        <div className="bg-white w-full max-w-2xl rounded-3xl shadow-xl overflow-hidden border-b-8 border-indigo-400">
                            
                            {/* Zona de la Frase */}
                            <div className="bg-indigo-100 p-8 text-center border-b border-indigo-200">
                                <h3 className="text-gray-500 uppercase text-xs md:text-sm font-bold tracking-wider mb-2">Lee la frase atentamente</h3>
                                <p className="text-2xl md:text-3xl text-gray-800 font-medium leading-relaxed">
                                    {currentQ.sentence.split(new RegExp(`(${currentQ.word})`, 'gi')).map((part, i) => 
                                        part.toLowerCase() === currentQ.word.toLowerCase() ? 
                                        <span key={i} className="bg-yellow-200 px-2 rounded text-indigo-900 font-bold border-b-4 border-yellow-400 inline-block">{part}</span> : 
                                        part
                                    )}
                                </p>
                            </div>

                            {/* Zona del Diccionario */}
                            <div className="p-6 md:p-8 bg-white">
                                <div className="mb-4 text-gray-400 text-sm font-bold uppercase flex items-center">
                                    <IconBook size={16} className="mr-2" /> Diccionario Escolar
                                </div>
                                
                                <div className="space-y-3">
                                    {currentQ.options.map((option) => {
                                        let cardClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-start ";
                                        
                                        if (selectedOption === null) {
                                            cardClass += "border-gray-200 hover:border-blue-400 hover:bg-blue-50 cursor-pointer";
                                        } else if (option.id === selectedOption) {
                                            cardClass += option.correct 
                                                ? "border-green-500 bg-green-50 ring-2 ring-green-200" 
                                                : "border-red-500 bg-red-50 ring-2 ring-red-200";
                                        } else {
                                            cardClass += "border-gray-100 opacity-50";
                                        }

                                        return (
                                            <button 
                                                key={option.id}
                                                onClick={() => handleOptionClick(option)}
                                                disabled={showFeedback}
                                                className={cardClass}
                                            >
                                                <span className={`font-bold rounded-full w-8 h-8 flex-shrink-0 flex items-center justify-center mr-3 ${selectedOption === option.id && option.correct ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-600'}`}>
                                                    {option.id}
                                                </span>
                                                <span className="text-lg text-gray-700 mt-1">{option.text}</span>
                                                
                                                {/* Iconos de resultado */}
                                                {selectedOption === option.id && option.correct && <IconCheckCircle className="ml-auto text-green-500 h-8 w-8 flex-shrink-0" />}
                                                {selectedOption === option.id && !option.correct && <IconXCircle className="ml-auto text-red-500 h-8 w-8 flex-shrink-0" />}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Zona de Feedback / Botón Siguiente */}
                            {showFeedback && (
                                <div className={`p-4 text-center ${isCorrect ? 'bg-green-100' : 'bg-red-100'}`}>
                                    <p className={`text-lg font-bold mb-3 ${isCorrect ? 'text-green-700' : 'text-red-700'}`}>
                                        {isCorrect ? "¡Excelente! Esa es la acepción correcta." : "¡Oh no! Esa acepción no encaja."}
                                    </p>
                                    <button 
                                        onClick={nextQuestion}
                                        className={`py-3 px-8 rounded-full font-bold text-white shadow-lg transform transition hover:scale-105 ${isCorrect ? 'bg-green-600 hover:bg-green-700' : 'bg-red-500 hover:bg-red-600'}`}
                                    >
                                        {currentQuestion < questions.length - 1 ? "Siguiente Caso" : "Ver Resultado"}
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Pantalla 4: Resultado Final
            if (gameState === 'result') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-purple-50 p-4 font-sans text-center">
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-lg border-b-8 border-purple-400 w-full">
                            <div className="animate-bounce-slow mb-4 flex justify-center">
                                <IconTrophy size={80} className="text-yellow-400" />
                            </div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">¡Misión Cumplida!</h2>
                            <p className="text-xl text-gray-600 mb-6">Has resuelto los misterios del diccionario.</p>
                            
                            <div className="bg-purple-100 rounded-xl p-6 mb-8">
                                <p className="text-gray-500 uppercase text-sm font-bold tracking-wider mb-2">Puntuación Final</p>
                                <div className="text-5xl font-bold text-purple-600">{score} / {questions.length}</div>
                                <div className="flex justify-center mt-2 space-x-1">
                                    {[...Array(5)].map((_, i) => (
                                        <IconStar key={i} size={24} className={i < score ? "text-yellow-400 fill-current" : "text-gray-300"} />
                                    ))}
                                </div>
                            </div>

                            <p className="mb-8 text-gray-700 text-lg">
                                {score === 5 ? "¡Eres un MAESTRO del diccionario! 🏆" : 
                                score >= 3 ? "¡Muy buen trabajo, detective! 🕵️‍♀️" : 
                                "¡Buen intento! Sigue practicando. 💪"}
                            </p>

                            <button 
                                onClick={restartGame}
                                className="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-3 px-8 rounded-full shadow-lg transition"
                            >
                                Jugar otra vez
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DictionaryGame />);
    </script>
</body>
</html>

                const newArray = [...array];
                for (let i = newArray.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [newArray[i], newArray[j]] = [newArray[j], newArray[i]];

                setGameQuestions(selected);
                setCurrentQuestionIndex(0);

                setSelectedOption(null);
                setShowFeedback(false);

                setGameState(skipIntro ? 'game' : 'intro');

                                        let cardClass = "w-full text-left p-4 rounded-xl border-2 transition-all duration-200 flex items-start ";
                                        
                                        if (selectedOption === null) {
                                            cardClass += "border-gray-200 hover:border-blue-400 hover:bg-blue-50 cursor-pointer";
                                        } else if (option.id === selectedOption) {
                                            cardClass += option.correct 
                                                ? "border-green-500 bg-green-50 ring-2 ring-green-200" 
                                                : "border-red-500 bg-red-50 ring-2 ring-red-200";
                                        } else {
                                            cardClass += "border-gray-100 opacity-50";
                                        }

                                        return (
                                            <button 
                                                key={option.id}
                                                onClick={() => handleOptionClick(option)}
                                                disabled={showFeedback}
                                                className={cardClass}
                                            >
                                                <span className={`font-bold rounded-full w-8 h-8 flex-shrink-0 flex items-center justify-center mr-3 ${selectedOption === option.id && option.correct ? 'bg-green-500 text-white' : 'bg-gray-200 text-gray-600'}`}>
                                                    {option.id}
                                                </span>
                                                <span className="text-lg text-gray-700 mt-1">{option.text}</span>
                                                
                                                {/* Iconos de resultado */}
                                                {selectedOption === option.id && option.correct && <IconCheckCircle className="ml-auto text-green-500 h-8 w-8 flex-shrink-0" />}
                                                {selectedOption === option.id && !option.correct && <IconXCircle className="ml-auto text-red-500 h-8 w-8 flex-shrink-0" />}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Zona de Feedback / Botón Siguiente */}
                            {showFeedback && (
                                <div className={`p-4 text-center ${isCorrect ? 'bg-green-100' : 'bg-red-100'}`}>
                                    <p className={`text-lg font-bold mb-3 ${isCorrect ? 'text-green-700' : 'text-red-700'}`}>
                                        {isCorrect ? "¡Excelente! Esa es la acepción correcta." : "¡Oh no! Esa acepción no encaja."}
                                    </p>
                                    <button 
                                        onClick={nextQuestion}
                                        className={`py-3 px-8 rounded-full font-bold text-white shadow-lg transform transition hover:scale-105 ${isCorrect ? 'bg-green-600 hover:bg-green-700' : 'bg-red-500 hover:bg-red-600'}`}
                                    >
                                        {currentQuestionIndex < gameQuestions.length - 1 ? "Siguiente Caso" : "Ver Resultado"}
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            // Pantalla 4: Resultado Final
            if (gameState === 'result') {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-purple-50 p-4 font-sans text-center">
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-lg border-b-8 border-purple-400 w-full">
                            <div className="animate-bounce-slow mb-4 flex justify-center">
                                <IconTrophy size={80} className="text-yellow-400" />
                            </div>
                            <h2 className="text-3xl font-bold text-gray-800 mb-2">¡Misión Cumplida!</h2>
                            <p className="text-xl text-gray-600 mb-6">Has resuelto los misterios del diccionario.</p>
                            
                            <div className="bg-purple-100 rounded-xl p-6 mb-8">
                                <p className="text-gray-500 uppercase text-sm font-bold tracking-wider mb-2">Puntuación Final</p>
                                <div className="text-5xl font-bold text-purple-600">{score} / {QUESTIONS_PER_GAME}</div>
                                <div className="flex justify-center mt-2 space-x-1">
                                    {[...Array(5)].map((_, i) => (
                                        <IconStar key={i} size={24} className={i < Math.round(score/2) ? "text-yellow-400 fill-current" : "text-gray-300"} />
                                    ))}
                                </div>
                            </div>

                            <p className="mb-8 text-gray-700 text-lg">
                                {score === QUESTIONS_PER_GAME ? "¡Eres un MAESTRO del diccionario! 🏆" : 
                                score >= (QUESTIONS_PER_GAME / 2) ? "¡Muy buen trabajo, detective! 🕵️‍♀️" : 
                                "¡Buen intento! Sigue practicando. 💪"}
                            </p>

                            <button 
                                onClick={() => startNewGame(true)}
                                className="bg-blue-500 hover:bg-blue-600 text-white text-xl font-bold py-3 px-8 rounded-full shadow-lg transition flex items-center justify-center mx-auto"
                            >
                                <IconRefresh className="mr-2" /> Jugar otra vez (Nuevas palabras)
                            </button>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<DictionaryGame />);
    </script>
</body>
</html>
